name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format, Lint, Typecheck, Test, Browser Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          version: "0.1.24"
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Ensure Electron binary is installed
        run: node scripts/ensure-electron-binary.ts

      - name: Format
        run: vp fmt --check

      - name: Lint
        run: vp exec vp lint --report-unused-disable-directives

      - name: Typecheck
        run: vp exec vp run -r --concurrency-limit 2 typecheck

      - name: Test
        run: vp exec vp run test

      - name: Install browser test runtime
        run: vp exec vp run --filter @threadlines/web test:browser:install

      - name: Browser test
        run: vp exec vp run --filter @threadlines/web test:browser

      - name: Build desktop pipeline
        run: vp exec vp run build:desktop

      - name: Verify preload bundle output
        run: |
          test -f apps/desktop/dist-electron/preload.cjs
          grep -nE "desktopBridge|getLocalEnvironmentBootstrap|PICK_FOLDER_CHANNEL|wsUrl" apps/desktop/dist-electron/preload.cjs

  release_smoke:
    name: Release Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          version: "0.1.24"
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Exercise release-only workflow steps
        run: node scripts/release-smoke.ts

  deploy_web_app:
    name: Deploy app.threadlines.dev
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - quality
      - release_smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: app.threadlines.dev
      url: https://app.threadlines.dev
    env:
      VERCEL_CLI_VERSION: 54.14.5
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VITE_HOSTED_APP_CHANNEL: latest
      VITE_HOSTED_APP_URL: https://app.threadlines.dev
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          version: "0.1.24"
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install --global "vercel@${VERCEL_CLI_VERSION}"

      - name: Verify Vercel deployment secrets
        shell: bash
        run: |
          missing=()
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf '::error::Missing required GitHub secret(s): %s\n' "${missing[*]}"
            echo "Add VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID to this repository's Actions secrets." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Pull Vercel production environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel production artifact
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy Vercel production artifact
        shell: bash
        run: |
          vercel deploy --prebuilt --prod --yes --token="$VERCEL_TOKEN" | tee /tmp/vercel-deploy.log
          deployment_url="$(grep -Eo 'https://[^ ]+' /tmp/vercel-deploy.log | tail -n 1)"
          {
            echo "### app.threadlines.dev deployment"
            echo
            echo "- Commit: ${GITHUB_SHA}"
            if [[ -n "$deployment_url" ]]; then
              echo "- Deployment: $deployment_url"
            fi
            echo "- Production URL: https://app.threadlines.dev"
          } >> "$GITHUB_STEP_SUMMARY"
