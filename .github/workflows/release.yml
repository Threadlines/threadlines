name: Desktop Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel. Nightly builds from main and publishes a GitHub prerelease."
        required: true
        default: nightly
        type: choice
        options:
          - nightly
          - stable
      version:
        description: "Optional. Stable target version. Blank uses the next patch after the latest stable tag; nightly appends -nightly.YYYYMMDD.RUN."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Verify desktop release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.release_meta.outputs.version }}
      tag: ${{ steps.release_meta.outputs.tag }}
      name: ${{ steps.release_meta.outputs.name }}
      channel: ${{ steps.release_meta.outputs.channel }}
      is_prerelease: ${{ steps.release_meta.outputs.is_prerelease }}
      make_latest: ${{ steps.release_meta.outputs.make_latest }}
      ref: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Ensure Electron binary is installed
        run: node scripts/ensure-electron-binary.ts

      - id: release_meta
        name: Resolve release metadata
        shell: bash
        env:
          DISPATCH_CHANNEL: ${{ inputs.channel }}
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          plain_stable_pattern='^[0-9]+\.[0-9]+\.[0-9]+$'
          nightly_pattern='^[0-9]+\.[0-9]+\.[0-9]+-nightly\.[0-9]{8}\.[0-9]+$'

          resolve_next_stable_version() {
            git fetch --force --tags origin "refs/tags/*:refs/tags/*"

            latest_stable_tag="$(
              git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname |
                grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' |
                head -n 1 || true
            )"

            if [[ -z "$latest_stable_tag" ]]; then
              echo "0.0.1"
              return
            fi

            latest_version="${latest_stable_tag#v}"
            IFS='.' read -r major minor patch <<< "$latest_version"
            echo "$major.$minor.$((patch + 1))"
          }

          resolve_nightly_metadata() {
            target_version="${1:-}"
            args=(
              scripts/resolve-nightly-release.ts
              --date "$(date -u +%Y%m%d)"
              --run-number "$GITHUB_RUN_NUMBER"
              --sha "$GITHUB_SHA"
            )
            if [[ -n "$target_version" ]]; then
              args+=(--target-version "$target_version")
            else
              git fetch --force --tags origin "refs/tags/*:refs/tags/*"
            fi

            bun "${args[@]}"
          }

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            if [[ "$version" =~ $nightly_pattern ]]; then
              channel="nightly"
              name="BadCode Nightly $version (${GITHUB_SHA:0:12})"
              is_prerelease=true
              make_latest=false
            elif [[ "$version" =~ $plain_stable_pattern ]]; then
              channel="stable"
              name="BadCode v$version"
              is_prerelease=false
              make_latest=true
            else
              echo "Invalid release tag: ${GITHUB_REF_NAME}" >&2
              exit 1
            fi
          else
            channel="${DISPATCH_CHANNEL:-nightly}"
            raw="${DISPATCH_VERSION:-}"

            if [[ "$channel" != "stable" && "$channel" != "nightly" ]]; then
              echo "Invalid release channel: $channel" >&2
              exit 1
            fi

            if [[ "$channel" == "nightly" && "${GITHUB_REF_NAME}" != "main" ]]; then
              echo "Nightly releases must be dispatched from main. Current ref is ${GITHUB_REF_NAME}." >&2
              exit 1
            fi

            raw="${raw#v}"
            if [[ "$channel" == "stable" ]]; then
              if [[ -z "${raw//[[:space:]]/}" ]]; then
                version="$(resolve_next_stable_version)"
              elif [[ "$raw" =~ $plain_stable_pattern ]]; then
                version="$raw"
              else
                echo "Stable releases require a plain semver version, got: ${raw:-<blank>}" >&2
                exit 1
              fi

              name="BadCode v$version"
              is_prerelease=false
              make_latest=true
            else
              if [[ -z "${raw//[[:space:]]/}" ]]; then
                nightly_metadata="$(resolve_nightly_metadata)"
              elif [[ "$raw" =~ $plain_stable_pattern ]]; then
                nightly_metadata="$(resolve_nightly_metadata "$raw")"
              elif [[ "$raw" =~ $nightly_pattern ]]; then
                version="$raw"
                name="BadCode Nightly $version (${GITHUB_SHA:0:12})"
              else
                echo "Nightly releases require a blank version, a plain target version, or a full nightly version. Got: ${raw:-<blank>}" >&2
                exit 1
              fi

              if [[ -n "${nightly_metadata:-}" ]]; then
                while IFS='=' read -r key value; do
                  case "$key" in
                    version) version="$value" ;;
                    name) name="$value" ;;
                  esac
                done <<< "$nightly_metadata"
              fi

              is_prerelease=true
              make_latest=false
            fi
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: ${version:-<blank>}" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF_TYPE}" != "tag" ]] && git rev-parse --verify --quiet "refs/tags/v$version" >/dev/null; then
            echo "Release tag already exists: v$version" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"
          echo "make_latest=$make_latest" >> "$GITHUB_OUTPUT"

      - name: Format check
        run: bun run fmt:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

  windows:
    name: Build Windows x64 installer
    needs: preflight
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Ensure Electron binary is installed
        run: node scripts/ensure-electron-binary.ts

      - name: Align release package versions
        run: bun scripts/update-release-package-versions.ts "${{ needs.preflight.outputs.version }}"

      - name: Build Windows installer
        env:
          BADCODE_DESKTOP_UPDATE_REPOSITORY: ${{ github.repository }}
        run: >
          bun run dist:desktop:artifact --
          --platform win
          --target nsis
          --arch x64
          --build-version "${{ needs.preflight.outputs.version }}"
          --verbose

      - name: List release assets
        shell: pwsh
        run: Get-ChildItem release | Select-Object Name, Length

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-windows-x64
          path: release/*
          if-no-files-found: error

  macos:
    name: Build macOS ${{ matrix.arch }} artifact
    needs: preflight
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
          - arch: x64
            runner: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Ensure Electron binary is installed
        run: node scripts/ensure-electron-binary.ts

      - name: Align release package versions
        run: bun scripts/update-release-package-versions.ts "${{ needs.preflight.outputs.version }}"

      - name: Build macOS artifact
        env:
          BADCODE_DESKTOP_UPDATE_REPOSITORY: ${{ github.repository }}
          BADCODE_DESKTOP_SIGNED: ${{ vars.BADCODE_MACOS_SIGNED == 'true' && 'true' || 'false' }}
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: >
          bun run dist:desktop:artifact --
          --platform mac
          --target dmg
          --arch "${{ matrix.arch }}"
          --build-version "${{ needs.preflight.outputs.version }}"
          --verbose

      - name: Normalize macOS updater manifests
        shell: bash
        env:
          ARCH: ${{ matrix.arch }}
          CHANNEL: ${{ needs.preflight.outputs.channel }}
        run: |
          set -euo pipefail

          normalize_manifest() {
            local source="$1"
            local target="$2"
            if [[ -f "release/$source" && ! -f "release/$target" ]]; then
              cp "release/$source" "release/$target"
            fi
          }

          if [[ "$ARCH" == "x64" ]]; then
            normalize_manifest "latest-mac.yml" "latest-mac-x64.yml"
            normalize_manifest "nightly-mac.yml" "nightly-mac-x64.yml"
            rm -f release/latest-mac.yml release/nightly-mac.yml
          else
            normalize_manifest "nightly-mac.yml" "latest-mac.yml"
          fi

          if [[ "$CHANNEL" == "nightly" ]]; then
            if [[ "$ARCH" == "x64" ]]; then
              normalize_manifest "latest-mac-x64.yml" "nightly-mac-x64.yml"
            else
              normalize_manifest "latest-mac.yml" "nightly-mac.yml"
            fi
          fi

      - name: List macOS release assets
        run: find release -maxdepth 1 -type f -print

      - name: Upload macOS release assets
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-macos-${{ matrix.arch }}
          path: release/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - preflight
      - windows
      - macos
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-release-*
          path: release-artifacts

      - name: Stage release assets
        shell: bash
        run: |
          set -euo pipefail
          rm -rf release
          mkdir -p release
          find release-artifacts -type f -exec cp -f {} release/ \;
          ls -la release

      - name: Normalize updater manifests
        shell: bash
        env:
          CHANNEL: ${{ needs.preflight.outputs.channel }}
        run: |
          set -euo pipefail

          if [[ "$CHANNEL" == "nightly" ]]; then
            if [[ -f release/nightly.yml && ! -f release/latest.yml ]]; then
              cp release/nightly.yml release/latest.yml
            fi
            if [[ -f release/nightly-mac.yml && ! -f release/latest-mac.yml ]]; then
              cp release/nightly-mac.yml release/latest-mac.yml
            fi
            if [[ -f release/nightly-mac-x64.yml && ! -f release/latest-mac-x64.yml ]]; then
              cp release/nightly-mac-x64.yml release/latest-mac-x64.yml
            fi
          fi

          merge_mac_manifest() {
            local primary="$1"
            local secondary="$2"

            if [[ -f "release/$primary" && -f "release/$secondary" ]]; then
              bun scripts/merge-update-manifests.ts \
                --platform mac \
                "release/$primary" \
                "release/$secondary" \
                "release/$primary"
              rm -f "release/$secondary"
            elif [[ ! -f "release/$primary" && -f "release/$secondary" ]]; then
              mv "release/$secondary" "release/$primary"
            fi
          }

          merge_mac_manifest "latest-mac.yml" "latest-mac-x64.yml"
          if [[ "$CHANNEL" == "nightly" ]]; then
            merge_mac_manifest "nightly-mac.yml" "nightly-mac-x64.yml"
          fi

          ls -la release

      - name: Generate release notes
        run: >
          bun scripts/generate-release-notes.ts
          --channel "${{ needs.preflight.outputs.channel }}"
          --current-tag "${{ needs.preflight.outputs.tag }}"
          --current-ref "${{ needs.preflight.outputs.ref }}"
          --repository "${{ github.repository }}"
          --output release-notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ needs.preflight.outputs.ref }}
          name: ${{ needs.preflight.outputs.name }}
          body_path: release-notes.md
          prerelease: ${{ needs.preflight.outputs.is_prerelease }}
          make_latest: ${{ needs.preflight.outputs.make_latest }}
          files: |
            release/*.exe
            release/*.blockmap
            release/*.dmg
            release/*.zip
            release/*.yml
          fail_on_unmatched_files: true
