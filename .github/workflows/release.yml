name: Windows Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.0 or v0.1.0-alpha.1"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  windows:
    name: Build and publish Windows installer
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - id: release_meta
        name: Resolve release metadata
        shell: pwsh
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
          DISPATCH_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          $raw = if ($env:GITHUB_REF_TYPE -eq "tag") {
            $env:GITHUB_REF_NAME
          } else {
            $env:DISPATCH_VERSION
          }

          if ([string]::IsNullOrWhiteSpace($raw)) {
            Write-Error "Release version is required."
            exit 1
          }

          $version = $raw.Trim() -replace "^v", ""
          if ($version -notmatch "^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$") {
            Write-Error "Invalid release version: $raw"
            exit 1
          }

          $isPlainStable = $version -match "^[0-9]+\.[0-9]+\.[0-9]+$"
          $forcedPrerelease = $env:DISPATCH_PRERELEASE -eq "true"
          $isPrerelease = (-not $isPlainStable) -or $forcedPrerelease
          $makeLatest = -not $isPrerelease

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT
          "name=BadCode v$version" >> $env:GITHUB_OUTPUT
          "is_prerelease=$($isPrerelease.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "make_latest=$($makeLatest.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Format check
        run: bun run fmt:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Align release package versions
        run: bun scripts/update-release-package-versions.ts "${{ steps.release_meta.outputs.version }}"

      - name: Build Windows installer
        env:
          T3CODE_DESKTOP_UPDATE_REPOSITORY: ${{ github.repository }}
        run: >
          bun run dist:desktop:artifact --
          --platform win
          --target nsis
          --arch x64
          --build-version "${{ steps.release_meta.outputs.version }}"
          --verbose

      - name: List release assets
        shell: pwsh
        run: Get-ChildItem release | Select-Object Name, Length

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: badcode-windows-x64-${{ steps.release_meta.outputs.version }}
          path: |
            release/*.exe
            release/*.blockmap
            release/*.yml
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release_meta.outputs.name }}
          generate_release_notes: true
          prerelease: ${{ steps.release_meta.outputs.is_prerelease }}
          make_latest: ${{ steps.release_meta.outputs.make_latest }}
          files: |
            release/*.exe
            release/*.blockmap
            release/*.yml
          fail_on_unmatched_files: true
