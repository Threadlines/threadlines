name: Windows Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Optional. Leave blank to release the next stable patch version."
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: windows-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Verify release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.release_meta.outputs.version }}
      tag: ${{ steps.release_meta.outputs.tag }}
      name: ${{ steps.release_meta.outputs.name }}
      is_prerelease: ${{ steps.release_meta.outputs.is_prerelease }}
      make_latest: ${{ steps.release_meta.outputs.make_latest }}
      ref: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Ensure Electron binary is installed
        run: node scripts/ensure-electron-binary.ts

      - id: release_meta
        name: Resolve release metadata
        shell: bash
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
          DISPATCH_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            raw="${GITHUB_REF_NAME}"
          else
            raw="${DISPATCH_VERSION:-}"
          fi

          if [[ -z "${raw//[[:space:]]/}" ]]; then
            git fetch --force --tags origin "refs/tags/*:refs/tags/*"

            latest_stable_tag="$(
              git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname |
                grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' |
                head -n 1 || true
            )"

            if [[ -z "$latest_stable_tag" ]]; then
              version="0.0.1"
              echo "No stable release tags found; defaulting to v$version."
            else
              latest_version="${latest_stable_tag#v}"
              IFS='.' read -r major minor patch <<< "$latest_version"
              version="$major.$minor.$((patch + 1))"
              echo "No release version supplied; using next patch after $latest_stable_tag: v$version."
            fi
          else
            version="${raw#v}"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: ${raw:-$version}" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF_TYPE}" != "tag" ]] && git rev-parse --verify --quiet "refs/tags/v$version" >/dev/null; then
            echo "Release tag already exists: v$version" >&2
            exit 1
          fi

          is_plain_stable=false
          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            is_plain_stable=true
          fi

          forced_prerelease=false
          if [[ "${DISPATCH_PRERELEASE:-false}" == "true" ]]; then
            forced_prerelease=true
          fi

          is_prerelease=true
          make_latest=false
          if [[ "$is_plain_stable" == "true" && "$forced_prerelease" != "true" ]]; then
            is_prerelease=false
            make_latest=true
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "name=BadCode v$version" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"
          echo "make_latest=$make_latest" >> "$GITHUB_OUTPUT"

      - name: Format check
        run: bun run fmt:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

  windows:
    name: Build and publish Windows installer
    needs: preflight
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Ensure Electron binary is installed
        run: node scripts/ensure-electron-binary.ts

      - name: Align release package versions
        run: bun scripts/update-release-package-versions.ts "${{ needs.preflight.outputs.version }}"

      - name: Build Windows installer
        env:
          BADCODE_DESKTOP_UPDATE_REPOSITORY: ${{ github.repository }}
        run: >
          bun run dist:desktop:artifact --
          --platform win
          --target nsis
          --arch x64
          --build-version "${{ needs.preflight.outputs.version }}"
          --verbose

      - name: List release assets
        shell: pwsh
        run: Get-ChildItem release | Select-Object Name, Length

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: badcode-windows-x64-${{ needs.preflight.outputs.version }}
          path: |
            release/*.exe
            release/*.blockmap
            release/*.yml
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ needs.preflight.outputs.ref }}
          name: ${{ needs.preflight.outputs.name }}
          generate_release_notes: true
          prerelease: ${{ needs.preflight.outputs.is_prerelease }}
          make_latest: ${{ needs.preflight.outputs.make_latest }}
          files: |
            release/*.exe
            release/*.blockmap
            release/*.yml
          fail_on_unmatched_files: true
