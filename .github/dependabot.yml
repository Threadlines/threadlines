version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    ignore:
      # Dependabot mishandles this pnpm catalog entry (drops it from the
      # catalog and hardcodes the lockfile importer), producing unmergeable
      # PRs. The typecheck toolchain is bumped manually instead.
      - dependency-name: "@effect/tsgo"
      # Electron bumps can regress GPU compositing in ways CI cannot catch
      # (43.1.1 produced stale-tile strips at the sidebar boundary on
      # Windows). Bump manually and soak on real hardware first.
      - dependency-name: "electron"
    groups:
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
