version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    ignore:
      # Dependabot mishandles this pnpm catalog entry (drops it from the
      # catalog and hardcodes the lockfile importer), producing unmergeable
      # PRs. The typecheck toolchain is bumped manually instead.
      - dependency-name: "@effect/tsgo"
      # Same catalog-hardcoding bug (PR #75 rewrote the root importer's
      # 'catalog:' specifier to a literal 0.2.5, breaking frozen-lockfile
      # installs). vite-plus must also move in lockstep with the `vite`
      # catalog alias (@voidzero-dev/vite-plus-core) and the setup-vp pins
      # in CI workflows, so it is bumped manually as a coordinated change.
      - dependency-name: "vite-plus"
      - dependency-name: "vite"
      # Electron bumps can regress GPU compositing in ways CI cannot catch
      # (43.1.1 produced stale-tile strips at the sidebar boundary on
      # Windows). Bump manually and soak on real hardware first.
      - dependency-name: "electron"
    groups:
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
