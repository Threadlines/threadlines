packages:
  - apps/*
  - oxlint-plugin-threadlines
  - packages/*
  - scripts

catalog:
  "@effect/atom-react": 4.0.0-beta.59
  "@effect/openapi-generator": 4.0.0-beta.59
  "@effect/platform-bun": 4.0.0-beta.59
  "@effect/platform-node": 4.0.0-beta.59
  "@effect/platform-node-shared": 4.0.0-beta.59
  "@effect/sql-sqlite-bun": 4.0.0-beta.59
  "@effect/tsgo": 0.13.2
  "@effect/vitest": 4.0.0-beta.59
  "@pierre/diffs": 1.3.0-beta.9
  "@types/bun": ^1.3.11
  "@types/node": ^24.10.13
  "@typescript/native-preview": 7.0.0-dev.20260604.1
  effect: 4.0.0-beta.59
  typescript: ^5.7.3
  vite: npm:@voidzero-dev/vite-plus-core@0.1.24
  vite-plus: 0.1.24
  vitest: npm:@voidzero-dev/vite-plus-test@0.1.24
  yaml: ^2.9.0

ignoredBuiltDependencies:
  - msw

onlyBuiltDependencies:
  - electron
  - esbuild
  - msgpackr-extract
  - node-pty
  - sharp

overrides:
  "@effect/atom-react": "catalog:"
  "@effect/platform-bun": "catalog:"
  "@effect/platform-node": "catalog:"
  "@effect/platform-node-shared": "catalog:"
  "@effect/sql-sqlite-bun": "catalog:"
  "@effect/vitest": "catalog:"
  "@effect/vitest>@vitest/runner": "-"
  "@effect/vitest>vitest": "-"
  "@types/node": "catalog:"
  effect: "catalog:"
  vite: "catalog:"
  vitest: "catalog:"
  yaml: "catalog:"

packageExtensions:
  "@effect/vitest@*":
    dependencies:
      vite-plus: "catalog:"
    peerDependenciesMeta:
      vitest:
        optional: true
  vite-plus@*:
    dependencies:
      vite: "catalog:"

patchedDependencies:
  "@effect/platform-node-shared@4.0.0-beta.59": patches/@effect__platform-node-shared@4.0.0-beta.59.patch
  "@effect/vitest@4.0.0-beta.59": patches/@effect__vitest@4.0.0-beta.59.patch
  effect@4.0.0-beta.59: patches/effect@4.0.0-beta.59.patch
  lexical@0.41.0: patches/lexical@0.41.0.patch

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
