<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        width: 1500px;
        height: 500px;
        background: #0a0a0a;
        overflow: hidden;
        position: relative;
      }
      svg.mark {
        position: absolute;
        left: 150px;
        top: 50px;
        width: 1200px;
        height: 400px;
      }

  </head>

          <stop offset="0" stop-color="#a1a1aa" stop-opacity="0.4" />

      </defs>
      <g stroke-linecap="round" stroke-width="1.25">
        <path d="M 16 62 L 344 62" stroke="#ffffff" stroke-opacity="0.30" />
        <path

        <circle cx="322" cy="62" r="2" fill-opacity="0.35" />
        <circle cx="268" cy="62" r="2.5" fill-opacity="0.5" />
      </g>
      <circle cx="300" cy="90" r="5" fill="#6e94fa" fill-opacity="0.3" />
      <circle cx="300" cy="90" r="3" fill="#6e94fa" />
    </svg>
  </body>
</html>
