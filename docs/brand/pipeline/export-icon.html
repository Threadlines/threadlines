<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        background: transparent;
        overflow: hidden;
      }
      img {
        display: block;
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <img id="icon" alt="" />
    <script>
      const variant = new URLSearchParams(location.search).get("variant") || "regular";
      const file = variant === "small" ? "threadlines-icon-small.svg" : "threadlines-icon.svg";
      document.getElementById("icon").src = `../svg/${file}`;
    </script>
  </body>
</html>
