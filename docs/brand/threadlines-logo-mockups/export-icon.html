<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        background: transparent;
        overflow: hidden;
      }
      img {
        display: block;
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <img id="icon" alt="" />
    <script>
      const icon = new URLSearchParams(location.search).get("icon") || "minimal";
      document.getElementById("icon").src = `threadlines-icon-${icon}-v3.svg`;
    </script>
  </body>
</html>
